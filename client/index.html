<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Offload Operations Console — CRM, Dispatch & Business Control</title>
    <meta name="description" content="Internal operations console for the Offload network: customers, orders, drivers, laundromat partners, payouts, financials, and disputes — all in one place." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#5B4BC4" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Prevent theme flash: apply dark class before React hydrates -->
    <script>
      (function() {
        var stored = localStorage.getItem('offload-admin-theme');
        // Default dark unless user explicitly chose light
        if (stored !== 'light') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
